name: GitHub Metrics

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.METRICS_TOKEN }}

      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          output_action: none
          base: header, activity, community, repositories, metadata
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_load: 300
          plugin_languages_recent_days: 14
          config_timezone: America/Sao_Paulo

      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics-community.svg
          output_action: none
          base: ""
          plugin_notable: yes
          plugin_notable_repositories: yes
          plugin_notable_from: all
          plugin_people: yes
          plugin_people_types: followers, following
          plugin_people_limit: 24
          plugin_people_size: 28
          config_timezone: America/Sao_Paulo

      - name: Commit and push generated SVGs
        run: |
          mkdir -p generated
          cp /metrics_renders/github-metrics.svg generated/ 2>/dev/null || true
          cp /metrics_renders/github-metrics-community.svg generated/ 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated/
          git diff --staged --quiet || (git commit -m "chore: update GitHub metrics" && git push)
